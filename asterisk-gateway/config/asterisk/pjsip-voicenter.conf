; ───────────────────────────────────────────────────────────────
; Voicenter SIP trunk for Voice Agent SaaS outbound calls
; SIP server: sip09.voicenter.co  |  Transport: UDP (5060)
; ───────────────────────────────────────────────────────────────

[transport-udp-voicenter]
type=transport
protocol=udp
bind=0.0.0.0:5060
allow_reload=yes

; ─── Registration ────────────────────────────────────────────

[voicenter_trunk]
type=registration
transport=transport-udp-voicenter
outbound_auth=voicenter_trunk-auth
server_uri=sip:sip09.voicenter.co
client_uri=sip:F53WYCSk@sip09.voicenter.co
contact_user=F53WYCSk
retry_interval=60
forbidden_retry_interval=600
expiration=300
line=yes

; ─── Authentication ──────────────────────────────────────────

[voicenter_trunk-auth]
type=auth
auth_type=userpass
username=F53WYCSk
password=Om9pTcQyRnxbLdI4

; ─── AOR (Address of Record) ────────────────────────────────

[voicenter_trunk]
type=aor
contact=sip:sip09.voicenter.co
qualify_frequency=60

; ─── Endpoint ────────────────────────────────────────────────

[voicenter_trunk]
type=endpoint
transport=transport-udp-voicenter
aors=voicenter_trunk
outbound_auth=voicenter_trunk-auth
context=voiceagent-saas-outbound
disallow=all
allow=ulaw
from_domain=sip09.voicenter.co
from_user=F53WYCSk
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
direct_media=no
timers=yes
