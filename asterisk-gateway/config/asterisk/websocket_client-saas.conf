; ───────────────────────────────────────────────────────────────
; chan_websocket client for Voice Agent SaaS media bridge
; Connects Asterisk externalMedia channels to the gateway
; running on port 8091.
; ───────────────────────────────────────────────────────────────

[voiceagent_saas_media]
type = websocket_client
uri = ws://127.0.0.1:8091/asterisk-media
protocols = media
connection_type = per_call_config
connection_timeout = 500
reconnect_interval = 1000
reconnect_attempts = 5
